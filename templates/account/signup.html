{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}Sign Up - Hangarin{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1
                style="font-weight: 700; background: linear-gradient(135deg, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;">
                HANGARIN</h1>
            <p style="color: var(--text-muted);">Create your account</p>
        </div>

        <form method="post" action="{% url 'account_signup' %}">
            {% csrf_token %}
            {% bootstrap_form form %}

            <button type="submit" class="btn-premium" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>

        <p style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
            Already have an account? <a href="{% url 'account_login' %}"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
