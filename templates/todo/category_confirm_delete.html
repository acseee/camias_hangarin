{% extends 'base.html' %}
{% block title %}Delete Category - Hangarin{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass-card" style="max-width: 500px; text-align: center;">
        <i class="fas fa-exclamation-triangle"
            style="font-size: 3rem; color: var(--danger); margin-bottom: 1.5rem;"></i>
        <h2 style="font-weight: 700; margin-bottom: 1rem;">Delete Category?</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Are you sure you want to delete <strong>"{{
                object.name }}"</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button type="submit" class="btn-premium" style="background: var(--danger);">Yes, Delete</button>
                <a href="{% url 'category_list' %}"
                    style="padding: 0.75rem 1.5rem; text-decoration: none; color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 0.5rem; background: var(--glass-bg);">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
